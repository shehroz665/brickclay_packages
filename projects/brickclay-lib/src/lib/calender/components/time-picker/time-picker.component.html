<div class="time-picker-wrapper">
  <div class="time-input-group" [ngClass]="variation">
    @if (label) {
      <label>{{ label }}</label>
    }
    <div class="time-input-wrapper" [class.has-value]="hasValue">
      <input
        type="text"
        class="time-input"
        [value]="getDisplayValue()"
        [placeholder]="placeholder"
        [disabled]="disabled ? true : null"
        readonly
        (click)="!disabled && togglePicker()"
        (blur)="markAsTouched()"
      />
      <span class="time-icon">
        <img alt="timer" class="timer-icon" [src]="brickclayIcons.timerIcon" />
      </span>
      <button
        type="button"
        class="time-clear-btn"
        *ngIf="clearable && hasValue && !disabled"
        (click)="clear(); $event.stopPropagation()"
        title="Clear time"
        aria-label="Clear time"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
      <div class="custom-time-picker-dropdown" *ngIf="showPicker">
        <div
          class="custom-time-picker"
          [ngClass]="{
            'left-position': position === 'left',
            'right-position': position === 'right',
            'format-24': timeFormat === 24,
          }"
        >
          <!-- Hours Column -->
          <div class="time-column">
            <div class="time-scroll" #timeScroll>
              <div
                *ngFor="let h of getHours()"
                class="time-item"
                [class.selected]="currentHour === h"
                (click)="onHourChange(h)"
              >
                {{ h.toString().padStart(2, '0') }}
              </div>
            </div>
          </div>
          <span class="time-separator">:</span>
          <!-- Minutes Column (cyclic wheel: 59 -> 00) -->
          <div class="time-column">
            <div class="time-scroll time-wheel" #minuteScroll (scroll)="onMinuteWheelScroll()">
              <div
                *ngFor="let m of wheelMinutes"
                class="time-item"
                [class.selected]="currentMinute === m"
                (click)="onMinuteChange(m)"
              >
                {{ m.toString().padStart(2, '0') }}
              </div>
            </div>
          </div>
          @if (showSeconds) {
            <span class="time-separator">:</span>
            <!-- Seconds Column (cyclic wheel: 59 -> 00) -->
            <div class="time-column">
              <div class="time-scroll time-wheel" #secondScroll (scroll)="onSecondWheelScroll()">
                <div
                  *ngFor="let s of wheelSeconds"
                  class="time-item"
                  [class.selected]="currentSecond === s"
                  (click)="onSecondChange(s)"
                >
                  {{ s.toString().padStart(2, '0') }}
                </div>
              </div>
            </div>
          }
          <!-- AM/PM Column (only in 12-hour format) -->
          @if (timeFormat === 12) {
            <span class="time-separator">:</span>
            <div class="time-column ampm-column">
              <div class="time-scroll" #timeScroll>
                <div
                  *ngFor="let ap of getAMPMOptions()"
                  class="time-item"
                  [class.selected]="currentAMPM === ap"
                  (click)="onAMPMChange(ap)"
                >
                  {{ ap }}
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
