    @if (loading) {
      <div
        class="lg:h-[calc(100vh-80px)] lg:w-[calc(100vw-79px)] h-[calc(100vh-76px)] w-[calc(100vw-33px)] top-[59px] lg:left-[58px] left-[17px] right-0 bottom-6 bg-[#00000047] backdrop-blur-[2px] flex justify-center flex-col gap-4 items-center fixed z-[99999] rounded-xl"
      >
        @switch (variant) {
          @case ('dots') {
            <div class="grid-loader" [class.front-after]="frontAfter">
              <div class="grid-circle grid-filled"></div>
              <div class="grid-circle grid-outline"></div>
            </div>
          }

          @case ('spinners') {
            <div class="grid-spinner"></div>
          }
        }
      </div>
    }
